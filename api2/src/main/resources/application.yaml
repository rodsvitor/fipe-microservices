spring:
  application:
    name: api2

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fipe_db}
    username: ${DB_USERNAME:fipe_user}
    password: ${DB_PASSWORD:fipe_pass}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8081}

